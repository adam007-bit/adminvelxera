<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELXERA Admin • Premium Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#f0f2f8; font-family:'Inter',sans-serif; color:#1e293b; }
        .login-premium { max-width:440px; margin:10vh auto; background:white; border-radius:2rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); padding:2rem; }
        .admin-navbar { background:linear-gradient(135deg,#0f172a,#1e293b); padding:0.9rem 1.5rem; }
        .brand-logo { font-weight:700; font-size:1.4rem; background:linear-gradient(120deg,#10b981,#34d399); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1.2rem; margin-bottom:2rem; }
        .stat-card { background:white; border-radius:1.5rem; padding:1rem; display:flex; justify-content:space-between; align-items:center; }
        .filter-group { display:flex; flex-wrap:wrap; gap:0.6rem; margin-bottom:1.8rem; }
        .filter-pill { background:white; border:1px solid #e2e8f0; padding:0.5rem 1.2rem; border-radius:60px; cursor:pointer; }
        .filter-pill.active { background:#10b981; color:white; border-color:#10b981; }
        .order-card { background:white; border-radius:1.25rem; margin-bottom:1.2rem; border:1px solid #edf2f7; overflow:hidden; }
        .order-header { padding:1rem; background:#fafcff; border-bottom:1px solid #eff3f8; display:flex; justify-content:space-between; flex-wrap:wrap; }
        .status-badge-premium { font-size:0.7rem; font-weight:600; padding:0.3rem 0.9rem; border-radius:60px; }
        .status-pending { background:#fef3c7; color:#b45309; }
        .status-completed { background:#d1fae5; color:#065f46; }
        .status-cancelled { background:#fee2e2; color:#991b1b; }
        .order-body { padding:1rem; }
        .items-list { background:#f8fafc; border-radius:1rem; padding:0.6rem 1rem; margin:0.8rem 0; }
        .btn-action { border-radius:40px; padding:0.3rem 1rem; font-size:0.7rem; font-weight:600; background:transparent; cursor:pointer; }
        .btn-outline-complete { border:1px solid #3b82f6; color:#3b82f6; }
        .btn-outline-cancel { border:1px solid #ef4444; color:#ef4444; }
        .btn-outline-pending { border:1px solid #f59e0b; color:#f59e0b; }
        .toast-notif { position:fixed; bottom:24px; right:24px; background:#1e293b; color:white; padding:12px 20px; border-radius:60px; opacity:0; transition:0.2s; pointer-events:none; z-index:2000; }
        .toast-notif.show { opacity:1; }
        .receipt-thumb { max-width:60px; max-height:60px; border-radius:8px; margin-top:4px; cursor:pointer; }
        .modal-upload { display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center; }
        .modal-upload.show { display:flex; }
        .modal-content { background:white; border-radius:1.5rem; padding:1.5rem; max-width:400px; width:90%; }
        @media (max-width:640px){ .stat-number{font-size:1.4rem;} }
    </style>
</head>
<body>

<!-- Modal untuk upload resit parcel -->
<div id="parcelModal" class="modal-upload">
    <div class="modal-content">
        <h5 class="fw-bold mb-3"><i class="fa-solid fa-box-open text-success"></i> Selesai Pesanan</h5>
        <p class="small">Sila muat naik gambar resit penghantaran (parcel) untuk dihantar kepada pelanggan.</p>
        <input type="file" id="parcelReceiptInput" accept="image/jpeg,image/png,image/webp,image/gif" class="form-control mb-3">
        <div id="parcelProgress" class="small text-success" style="display:none;">⏳ Memuat naik...</div>
        <div class="d-flex gap-2 justify-content-end">
            <button class="btn btn-secondary btn-sm" id="cancelModalBtn">Batal</button>
            <button class="btn btn-success btn-sm" id="confirmCompleteBtn">Hantar & Selesai</button>
        </div>
    </div>
</div>

<div id="loginPanel" class="login-premium text-center">
    <i class="fa-solid fa-crown fa-3x text-success mb-3"></i>
    <h4 class="fw-bold">VELXERA VENTURES</h4>
    <input type="password" id="adminPassword" class="form-control my-3" placeholder="Kata Laluan">
    <button class="btn btn-success w-100" id="loginBtn">Log Masuk</button>
    <p class="text-muted small mt-3">🔐 velxera2025</p>
</div>

<div id="adminContent" style="display:none;">
    <nav class="admin-navbar d-flex justify-content-between align-items-center">
        <span class="brand-logo"><i class="fa-solid fa-leaf me-2"></i>VELXERA ADMIN</span>
        <button class="btn btn-sm btn-outline-light rounded-pill" id="logoutBtn">Keluar</button>
    </nav>
    <div class="container py-4">
        <div class="stat-grid">
            <div class="stat-card"><div><div class="stat-info"><h5>Jumlah</h5><div class="stat-number" id="statTotal">0</div></div></div><i class="fa-solid fa-chart-simple fa-2x text-success"></i></div>
            <div class="stat-card"><div><div class="stat-info"><h5>Pending</h5><div class="stat-number" id="statPending">0</div></div></div><i class="fa-solid fa-clock fa-2x text-warning"></i></div>
            <div class="stat-card"><div><div class="stat-info"><h5>Selesai</h5><div class="stat-number" id="statCompleted">0</div></div></div><i class="fa-solid fa-circle-check fa-2x text-primary"></i></div>
            <div class="stat-card"><div><div class="stat-info"><h5>Batal</h5><div class="stat-number" id="statCancelled">0</div></div></div><i class="fa-solid fa-ban fa-2x text-danger"></i></div>
        </div>
        <div class="filter-group">
            <div class="filter-pill active" data-filter="all">Semua</div>
            <div class="filter-pill" data-filter="pending">Pending</div>
            <div class="filter-pill" data-filter="completed">Selesai</div>
            <div class="filter-pill" data-filter="cancelled">Batal</div>
        </div>
        <div id="ordersList">Memuatkan...</div>
    </div>
</div>
<div id="toastMsg" class="toast-notif">✅ Status dikemaskini</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, doc, updateDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAdUZs-P5SPcivHHP9lRmdyOC355Op8bOU",
        authDomain: "spmn-af4f9.firebaseapp.com",
        projectId: "spmn-af4f9",
        storageBucket: "spmn-af4f9.firebasestorage.app",
        messagingSenderId: "621089003979",
        appId: "1:621089003979:web:bc819aef604b26f33b7e4e"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentFilter = 'all';
    let ordersData = [];
    let pendingOrderForComplete = null;

    function showToast(msg, err=false) { 
        const t=document.getElementById('toastMsg'); 
        t.innerHTML=err?`⚠️ ${msg}`:`✅ ${msg}`; 
        t.classList.add('show'); 
        setTimeout(()=>t.classList.remove('show'),2500); 
    }

    function checkAuth() { 
        const auth=sessionStorage.getItem('admin_auth'); 
        if(auth==='velxera2025'){ 
            document.getElementById('loginPanel').style.display='none'; 
            document.getElementById('adminContent').style.display='block'; 
            loadOrdersRealtime(); 
        } else { 
            document.getElementById('loginPanel').style.display='block'; 
            document.getElementById('adminContent').style.display='none'; 
        } 
    }

    document.getElementById('loginBtn').onclick=()=>{ 
        const pwd=document.getElementById('adminPassword').value; 
        if(pwd==='velxera2025'){ 
            sessionStorage.setItem('admin_auth',pwd); 
            checkAuth(); 
        } else showToast('Kata laluan salah',true); 
    };
    document.getElementById('logoutBtn').onclick=()=>{ 
        sessionStorage.removeItem('admin_auth'); 
        checkAuth(); 
    };

    function updateStats(){ 
        const total=ordersData.length; 
        const pending=ordersData.filter(o=>o.status==='pending').length; 
        const completed=ordersData.filter(o=>o.status==='completed').length; 
        const cancelled=ordersData.filter(o=>o.status==='cancelled').length; 
        document.getElementById('statTotal').innerText=total; 
        document.getElementById('statPending').innerText=pending; 
        document.getElementById('statCompleted').innerText=completed; 
        document.getElementById('statCancelled').innerText=cancelled; 
    }

    function loadOrdersRealtime(){ 
        onSnapshot(collection(db,"orders"),(snap)=>{ 
            ordersData=[]; 
            snap.forEach(d=>ordersData.push({id:d.id,...d.data()})); 
            ordersData.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)); 
            updateStats(); 
            renderOrders(); 
        }); 
    }

    // ================== MAMPATAN IMEJ (FAST UPLOAD) ==================
    async function compressImage(file, maxWidth=800, quality=0.7) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        if (!blob) {
                            reject(new Error('Mampatan imej gagal'));
                            return;
                        }
                        const compressedFile = new File([blob], file.name, { type: 'image/jpeg' });
                        resolve(compressedFile);
                    }, 'image/jpeg', quality);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    function sendWhatsAppWithImage(phoneNumber, message, imageUrl) {
        let cleanPhone = phoneNumber.replace(/[\s\-\(\)\+]/g, '');
        if (cleanPhone.startsWith('0')) {
            cleanPhone = '60' + cleanPhone.substring(1);
        }
        if (!cleanPhone.startsWith('60') && !cleanPhone.startsWith('65')) {
            cleanPhone = '60' + cleanPhone;
        }
        const fullMessage = `${message}\n\n📸 *Resit Penghantaran*: ${imageUrl}\n\nSila klik pautan di atas untuk melihat gambar.`;
        const waUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(fullMessage)}`;
        window.open(waUrl, '_blank');
    }

    async function completeOrderWithReceipt(orderId, orderData) {
        const fileInput = document.getElementById('parcelReceiptInput');
        let file = fileInput.files[0];
        if (!file) {
            showToast('Sila pilih gambar resit penghantaran', true);
            return false;
        }
        const allowedTypes = ['image/jpeg','image/png','image/webp','image/gif'];
        if (!allowedTypes.includes(file.type)) {
            showToast('Format fail tidak sah. Gunakan JPG/PNG/WEBP', true);
            return false;
        }
        if (file.size > 5 * 1024 * 1024) {
            showToast('Saiz fail maksimum 5MB', true);
            return false;
        }

        const progressDiv = document.getElementById('parcelProgress');
        progressDiv.style.display = 'block';
        progressDiv.innerHTML = '🖼️ Memampatkan imej... 0%';

        // Mampatkan imej sebelum upload
        let compressedFile;
        try {
            compressedFile = await compressImage(file, 900, 0.7);
            progressDiv.innerHTML = '⏳ Muat naik (sudah dimampatkan)... 0%';
        } catch (err) {
            progressDiv.style.display = 'none';
            showToast('Gagal memampatkan imej: ' + err.message, true);
            return false;
        }

        const fileExt = 'jpg'; // selepas mampatan, format jpeg
        const fileName = `parcel_${orderId}_${Date.now()}.${fileExt}`;
        const storageRef = ref(storage, `parcel_receipts/${fileName}`);
        const uploadTask = uploadBytesResumable(storageRef, compressedFile);

        try {
            const downloadURL = await new Promise((resolve, reject) => {
                uploadTask.on('state_changed',
                    (snapshot) => {
                        const percent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        progressDiv.innerHTML = `⏳ Muat naik ${Math.round(percent)}% (saiz termampat: ${(compressedFile.size/1024).toFixed(0)}KB)`;
                    },
                    (error) => reject(error),
                    async () => {
                        const url = await getDownloadURL(uploadTask.snapshot.ref);
                        resolve(url);
                    }
                );
            });
            progressDiv.innerHTML = '✅ Resit parcel berjaya!';
            await updateDoc(doc(db, "orders", orderId), {
                status: 'completed',
                parcelReceiptUrl: downloadURL,
                completedAt: new Date().toISOString()
            });
            const customerPhone = orderData.customer.phone;
            const customerName = orderData.customer.name;
            const message = `Hai ${customerName}, pesanan anda (ID: ${orderId}) telah selesai dihantar. Berikut resit penghantaran:`;
            sendWhatsAppWithImage(customerPhone, message, downloadURL);
            showToast('Pesanan diselesaikan & resit dihantar ke WhatsApp pelanggan');
            return true;
        } catch (err) {
            console.error(err);
            showToast('Gagal muat naik resit: ' + err.message, true);
            return false;
        } finally {
            setTimeout(() => { progressDiv.style.display = 'none'; }, 2000);
        }
    }

    // Modal handlers (sama seperti asal)
    const modal = document.getElementById('parcelModal');
    const cancelBtn = document.getElementById('cancelModalBtn');
    const confirmBtn = document.getElementById('confirmCompleteBtn');

    function showParcelModal(orderId, orderData) {
        pendingOrderForComplete = { id: orderId, data: orderData };
        document.getElementById('parcelReceiptInput').value = '';
        document.getElementById('parcelProgress').style.display = 'none';
        modal.classList.add('show');
    }

    cancelBtn.onclick = () => {
        modal.classList.remove('show');
        pendingOrderForComplete = null;
    };

    confirmBtn.onclick = async () => {
        if (!pendingOrderForComplete) return;
        const { id, data } = pendingOrderForComplete;
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = 'Memproses...';
        await completeOrderWithReceipt(id, data);
        confirmBtn.disabled = false;
        confirmBtn.innerHTML = 'Hantar & Selesai';
        modal.classList.remove('show');
        pendingOrderForComplete = null;
    };

    function renderOrders(){
        let filtered = currentFilter==='all' ? ordersData : ordersData.filter(o=>o.status===currentFilter);
        const container = document.getElementById('ordersList');
        if(filtered.length===0){ container.innerHTML='<div class="alert alert-light text-center">Tiada pesanan</div>'; return; }
        let html='';
        filtered.forEach(order=>{
            const itemsHtml = order.items.map(it=>`<li><i class="fa-regular fa-rectangle-list text-success me-2"></i>${it.prodName} (${it.size} - ${it.type}) x${it.qty} = RM${(it.price*it.qty).toFixed(2)}</li>`).join('');
            let statusClass = order.status==='pending'?'status-pending':(order.status==='completed'?'status-completed':'status-cancelled');
            let statusText = order.status==='pending'?'Pending':(order.status==='completed'?'Selesai':'Dibatalkan');
            
            const parcelReceiptHtml = order.parcelReceiptUrl ? `
                <div class="mt-1">
                    <small class="text-muted">📦 Resit penghantaran:</small><br>
                    <a href="${order.parcelReceiptUrl}" target="_blank" class="small">Lihat resit parcel</a>
                    <br><img src="${order.parcelReceiptUrl}" class="receipt-thumb" onclick="window.open('${order.parcelReceiptUrl}','_blank')">
                </div>
            ` : '';
            
            html+=`
                <div class="order-card">
                    <div class="order-header">
                        <span class="order-id"><i class="fa-regular fa-receipt"></i> ${order.orderId || order.id}</span>
                        <span class="status-badge-premium ${statusClass}">${statusText}</span>
                    </div>
                    <div class="order-body">
                        <div class="customer-detail d-flex gap-3 flex-wrap small">
                            <span><i class="fa-regular fa-user"></i> ${order.customer.name}</span>
                            <span><i class="fa-brands fa-whatsapp"></i> ${order.customer.phone}</span>
                            <span><i class="fa-regular fa-location-dot"></i> ${order.customer.address_line1}, ${order.customer.postcode} ${order.customer.state}</span>
                        </div>
                        <div class="items-list"><ul class="small mb-0">${itemsHtml}</ul></div>
                        <div class="d-flex justify-content-between flex-wrap">
                            <div><small class="text-muted">Bank: ${order.bankName || 'Tiada'} | ${order.paymentMethod}</small></div>
                            <div class="total-amount fw-bold">RM ${order.totalAmount.toFixed(2)}</div>
                        </div>
                        <div class="mt-2">
                            ${order.receiptUrl ? `
                                <div class="border rounded p-2 bg-light d-inline-block">
                                    <i class="fa-regular fa-image text-success me-1"></i>
                                    <a href="${order.receiptUrl}" target="_blank" class="small fw-bold">📸 Resit Bayaran</a>
                                    <br><img src="${order.receiptUrl}" style="max-width:60px; border-radius:8px;">
                                </div>
                            ` : '<span class="text-muted small"><i class="fa-regular fa-receipt"></i> Tiada resit bayaran (Bayar Kemudian)</span>'}
                        </div>
                        ${parcelReceiptHtml}
                        <div class="order-footer d-flex justify-content-end gap-2 mt-2">
                            ${order.status!=='completed' && order.status!=='cancelled' ? `<button class="btn-action btn-outline-complete" data-id="${order.id}" data-status="complete_action">✔ Selesai</button>` : ''}
                            ${order.status!=='cancelled' ? `<button class="btn-action btn-outline-cancel" data-id="${order.id}" data-status="cancelled">✖ Batal</button>` : ''}
                            ${order.status!=='pending' ? `<button class="btn-action btn-outline-pending" data-id="${order.id}" data-status="pending">↩ Pending</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.btn-action').forEach(btn=>{
            btn.addEventListener('click', async (e)=>{
                e.stopPropagation();
                const id = btn.dataset.id;
                const status = btn.dataset.status;
                if (status === 'complete_action') {
                    const order = ordersData.find(o => o.id === id);
                    if (order) showParcelModal(id, order);
                    else showToast('Data pesanan tidak ditemui', true);
                } else {
                    try {
                        await updateDoc(doc(db, "orders", id), { status: status });
                        showToast(`Status -> ${status.toUpperCase()}`);
                    } catch(err) {
                        showToast(err.message, true);
                    }
                }
            });
        });
    }

    document.querySelectorAll('.filter-pill').forEach(btn=>{
        btn.addEventListener('click',()=>{ 
            document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active')); 
            btn.classList.add('active'); 
            currentFilter=btn.dataset.filter; 
            renderOrders(); 
        });
    });
    
    checkAuth();
</script>
</body>
</html>
